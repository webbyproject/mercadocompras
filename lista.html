<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <div class="cabecalho"> <!-- cabeçalho -->
        <h1 class="portAlu">PORTAL DO ALUNO</h1>
        <div class="pesquisar">
            <input type="text" placeholder="&#128269; Pesquisar..." class="pesqInp">
        </div>
    </div> <!-- fim .cabecalho -->

    <main> <!-- box/container geral (menu + conteúdo), tinha utilizado uma div,mas como esta tag englobava todo o conteúdo principal,mudei para a tag <main> pois faz mais sentido -->

        <div class="abaMenu"> <!-- menu lateral -->

            <img class="letraA" src="assets\letraA.png" width="62" height="62">

            
            <div class="itemMenu"><img src="assets\home.png" width="25" height="25"> INÍCIO</div>
            <div class="itemMenu"><img src="assets\cart.png" width="25" height="25">CADASTRAR PRODUTOS</div>
            <a href="lista.html"><div class="itemMenu"><img src="assets\folder.png" width="25" height="25">MEUS PRODUTOS</div></a>
            <div class="itemMenu"><img src="assets\handprice.png" width="25" height="25">PREÇOS</div>
            <div class="itemMenu"><img src="assets\config.png" width="25" height="25">CONFIGURAÇÕES</div>


        </div> <!-- fim .abaMenu -->

        <div class="totalBox"> <!-- área total que centraliza o conteúdo -->

            <div class="pass"> <!--Div para cadastro de novo produto-->
                   
                    <div class="cadzinho"> <!-- Criada para alterar o espaçamento da fonte entre o "CADASTRO NOVO..." e o "OLA,ALUNO"-->
                    
                        <h1>Meus Produtos</h1><!--texto de explicação-->
                        <h3>Olá, Aluno! Aqui está uma lista com todos os seus produtos adicionados.</h3>
                        <br>
                    </div><!--fim .cadzinho-->

                    <div class="formProduto"> <!-- form deve ser sempre utilizado em formulários e englobar todo o campo de preenchimento do usupario, pois a tag indica ao navegador que esta parte se trata de um formulário, para que ele faça o envio correto dos dados-->

                        <div class="abaPrinc02"> <!--caixa principal-->

                           <table id="table"></table>
                        

                        
                    
                        </div><!--fim .abaPrinc-->
                   
                    </div><!--fim .formProduto-->
            
            </div><!--fim .pass-->
        
        </div> <!-- fim .totalbox -->

    </main> <!--fim de <main> -->
