<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <div class="cabecalho"> <!-- cabeçalho -->
        <h1 class="portAlu">PORTAL DO ALUNO</h1>
            <div class="pesquisar">
                <input type="text" placeholder="&#128269; Pesquisar..." class="pesqInp">
            </div>
    </div> <!-- fim .cabecalho -->

    <div class="teste"> <!-- container geral (menu + conteúdo) -->

        <div class="abaMenu"> <!-- menu lateral -->

            <img class="letraA" src="assets\letraA.png" width="62" height="62">

            
            <div class="itemMenu"><img src="assets\home.png" width="25" height="25"> INÍCIO</div>
            <div class="itemMenu"><img src="assets\cart.png" width="25" height="25">CADASTRAR PRODUTOS</div>
            <div class="itemMenu"><img src="assets\folder.png" width="25" height="25">MEUS PRODUTOS</div>
            <div class="itemMenu"><img src="assets\handprice.png" width="25" height="25">PREÇOS</div>
            <div class="itemMenu"><img src="assets\config.png" width="25" height="25">CONFIGURAÇÕES</div>

        </div> <!-- fim .abaMenu -->

        <div class="totalBox"> <!-- área que centraliza o conteúdo -->

            <div class="pass"> <!--Div para cadastro de novo produto-->

                   
                    <div class="cadzinho"> <!-- Criada para alterar o espaçamento da fonte entre o "CADASTRO NOVO..." e o "OLA,ALUNO"-->
                    
                        <h1>Cadastro de Novo Produto - Passo a Passo</h1><!--texto de explicação-->
                        <h3>Olá, Aluno! Preencha as informações abaixo para adicionar um produto.</h3>
                        <br>
                    </div>

                    <div class="abaPrinc">

                        <div class="mainInfo"> <!-- informações básicas -->
                            
                            <div class="juntaricon"> <!--Div criada para tentar juntar icon com o label correspondente (funcionou)-->
        
                                <h2 class="numeri">1</h2> <h2 class="designtest">Informações Básicas</h2> <!--Classe .numeri criada para tentar formar um círculo no numero-->
                                <img src="assets\box.png" width="32" height="32">

                            </div> <!--fim da .juntaricon-->


                            <br>
                            <label>Nome do Produto:</label>
                                <input class="allinp" placeholder="Ex: Jaqueta Aviador" type="text"><br><br>

                            <label>Descrição Curta:</label>
                                <textarea rows="2" cols="25" placeholder="Ex: aviador zipada azul" class="allinp"></textarea><br><br>

                            <label>Categoria</label>
                                <select class="allinp">
                                    <option>Vestuário</option>
                                    <option>Eletrônicos</option>
                                    <option>Alimentos</option>
                                </select>
                        </div> <!-- fim .mainInfo -->

                        <div class="definicao">  <!-- definição de preços -->

                            <div class="juntaricon"> 

                                <h2 class="numeri">2</h2> <h2 class="designtest">Definição de Preços</h2>
                                <img src="assets\price.png" width="42" height="42">

                            </div><!--fim .juntaricon 02-->

                            <br>
                            
                            <label>Preço de Venda ($):</label>
                                <input class="allinp" placeholder="R$" type="text"><br><br>
                            


                            <label>Preço de Custo:</label>
                                <input type="text" placeholder="R$" class="allinp">
                        </div> <!-- fim .definicao -->

                        <div class="em"> <!-- estoque e mídia -->

                            <div class="juntaricon"> 

                                <h2 class="numeri">3</h2> <h2 class="designtest">Estoque e Mídia</h2>
                                <img src="assets\camera.png" width="35" height="35">

                            </div><!--fim .juntaricon 03-->

                            <br><br>
                            <label>Quantidade em Estoque:</label>
                                <input type="text" placeholder="Ex: 100" class="allinp">
                        
                            <br><br>
                           <input type="file" id="img" name="img" accept="image/*">

                        <label>Adicionar Imagem:</label>
                        <label for="img" class="custom-upload"><!--Adicionar imagem (utilizei o gemini para aprimorar)-->
                            <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Câmera"><!-- imagem de câmera por link e não por assets-->
                            <span>Upload</span> <!--A tag span não tem função e pode ser utilizada apenas para estilização no css-->
                        </label>


                        </div> <!-- fim .em -->

                    </div> <!--Fim .abaPrinc-->
                     
                  
                    <div class="butDiv"> <!--aba de botões de cadastro de produtos e limpar formulário-->

                            <button class="butt01">Cadastrar Produto</button>
                            <button class="butt02"> Limpar Form</button>

                    </div><!--fim .butDiv - botões-->

                    
            </div> <!-- fim .pass,cadastro de novo produto -->

        </div> <!-- fim .totalbox -->

    </div> <!--fim de .teste-->


<footer>

</footer>

</body>
