<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>
    
<body>


    <header> <!--Portal do aluno, pesquisa, login-->

        <h1 class="portAlu">Portal do aluno</h1></h1>
        <div class="pesquisar">
            <input type="text" placeholder="&#128269; Pesquisar" class="pesqInp"> <br><br>
        </div>

    </header>

    <br>
    <div class="totalBox">    
        
        <div class="abaMenu"> <!--Aba do menu: início, produtos,config, etc-->

        <div class="itemMenu" id="inicioId" onclick="abaInicio('inicio')">Inicío</div><br>
        <div class="itemMenu" id="prodId" onclick="cadProd('produtos')">Cadastrar Produtos</div><br>
        <div class="itemMenu" id="meusId" onclick="meusProdutos('meusprod')">Meus produtos</div><br>
        <div class="itemMenu" id="precosId" onclick="precosP('precos')">Preços</div><br>
        <div class="itemMenu" id="configId" onclick="configClick('config')">Configurações</div><br>

        </div>

        <div class="mainInfo"> <!--Cadastro de novos produtos MAIN-->
            <h2> Informações Básicas</h2>
            <label for="nomeProd">Nome do Produto</label>
            <input type="text" placeholder="Ex: Jaqueta Aviador"><br><br>

            <label for="desCurt">Descrição Curta</label>
            <textarea name="descrição" id="descr" rows="3" cols="40" placeholder="Jaqueta zipada..."></textarea>
        </div>

    </div>


    <form id="form-login" onsubmit= abaInicio();>

        <h2>Bem Vindo!</h2>
    
    </form>




    <script src="Script.js"></script>
</body>
</html>
