<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="cabecalho"> <!-- cabeçalho -->
        <h1 class="portAlu">PORTAL DO ALUNO</h1>
        <div class="pesquisar">
            <input type="text" placeholder="&#128269; Pesquisar..." class="pesqInp">
        </div>
    </div> <!-- fim .cabecalho -->

    <br>

    <div class="teste"> <!-- container geral (menu + conteúdo) -->

        <div class="abaMenu"> <!-- menu lateral -->

            <div class="itemMenu">Início</div>
            <div class="itemMenu">Cadastrar Produtos</div>
            <div class="itemMenu">Meus produtos</div>
            <div class="itemMenu">Preços</div>
            <div class="itemMenu">Configurações</div>

        </div> <!-- fim .abaMenu -->

        <div class="totalBox"> <!-- área que centraliza o conteúdo -->

            <div> <!--Div para cadastro de novo produto-->

            <h1>Cadastro de Novo Produto - Passo a Passo</h1><!--texto de explicação-->
            <h3>Olá Aluno! Preencha as informações abaixo para adicionar um produto.</h3>
            <div class="abaPrinc"> <!-- caixa principal -->

                <div class="mainInfo"> <!-- informações básicas -->
                    <h2>Informações Básicas</h2>

                    <label>Nome do Produto</label>
                    <input type="text"><br><br>

                    <label>Descrição Curta</label>
                    <textarea rows="2" cols="25"></textarea>

                    <label>Categoria</label>
                    <select>
                        <option>Vestuário</option>
                        <option>Eletrônicos</option>
                        <option>Alimentos</option>
                    </select>
                </div> <!-- fim .mainInfo -->

                <div class="definicao"> <!-- definição de preços -->

                    <h2>Definição de Preços</h2>

                    <label>Preço de Venda</label>
                    <input type="text"><br><br>

                    <label>Preço de Custo</label>
                    <input type="text">
                </div> <!-- fim .definicao -->

                <div class="em"> <!-- estoque e mídia -->

                    <h2 class="explic">Estoque e Mídia</h2>

                    <label>Quantidade em Estoque</label>
                    <input type="text">
                </div> <!-- fim .em -->

            </div> <!-- fim .abaPrinc -->

        </div> <!-- fim .totalBox -->

    </div> <!-- fim .teste -->

    </div> <!--fim de de cadastro de novo produto-->

</body>
